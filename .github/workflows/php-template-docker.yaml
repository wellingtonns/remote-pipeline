name: Build and Push PHP Backend Image with Template Dockerfile

on:
  workflow_call:
    inputs:
      REGISTRY:
        required: false
        type: string
        default: ghcr.io
      IMAGE_REPOSITORY:
        required: false
        type: string
        default: ${{ github.repository }}
      CONTEXT_DIR:
        required: false
        type: string
        default: .
      APPLICATION:
        required: false
        type: string
        default: ""
      ENVIRONMENT:
        required: false
        type: string
        default: dev
      PHP_VERSION:
        required: false
        type: string
        default: "8.3"
      APP_PORT:
        required: false
        type: string
        default: "9090"
      NODE_VERSION:
        required: false
        type: string
        default: "20"
      COMPOSER_INSTALL_ARGS:
        required: false
        type: string
        default: "--no-interaction --prefer-dist --no-dev --no-scripts --no-progress --ignore-platform-req=ext-gd"
      FORCE_HTTPS:
        required: false
        type: string
        default: "1"
      WAIT_FOR_DB:
        required: false
        type: string
        default: "0"
      RUN_MIGRATIONS:
        required: false
        type: string
        default: "0"
      SCHEDULER_ENABLED:
        required: false
        type: string
        default: "0"
      PUSH_LATEST_BRANCHES:
        required: false
        type: string
        default: "dev,main"
    secrets:
      COMPOSER_AUTH_JSON:
        required: false
    outputs:
      image:
        description: "Built PHP backend image with SHA tag"
        value: ${{ jobs.build.outputs.image }}

env:
  REGISTRY: ${{ inputs.REGISTRY }}
  IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
  APPLICATION: ${{ inputs.APPLICATION }}
  ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
  PHP_VERSION: ${{ inputs.PHP_VERSION }}
  APP_PORT: ${{ inputs.APP_PORT }}
  NODE_VERSION: ${{ inputs.NODE_VERSION }}
  COMPOSER_INSTALL_ARGS: ${{ inputs.COMPOSER_INSTALL_ARGS }}
  FORCE_HTTPS: ${{ inputs.FORCE_HTTPS }}
  WAIT_FOR_DB: ${{ inputs.WAIT_FOR_DB }}
  RUN_MIGRATIONS: ${{ inputs.RUN_MIGRATIONS }}
  SCHEDULER_ENABLED: ${{ inputs.SCHEDULER_ENABLED }}
  PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-php-template-image-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate template runtime files
        shell: bash
        run: |
          set -euxo pipefail

          if [[ ! -f "${CONTEXT_DIR}/composer.json" ]]; then
            echo "ERROR: PHP backend files were not found in ${CONTEXT_DIR}"
            echo "Expected composer.json."
            exit 1
          fi

          cat > "${RUNNER_TEMP}/Dockerfile.php-template" <<EOF
          FROM node:${NODE_VERSION}-alpine AS assets

          WORKDIR /app

          COPY . .
          RUN if [ -f package.json ]; then npm ci --no-audit --no-fund; fi
          RUN if [ -f package.json ]; then npm run build; fi

          FROM composer:2 AS vendor

          WORKDIR /app

          ARG COMPOSER_AUTH_JSON
          ENV COMPOSER_AUTH=\${COMPOSER_AUTH_JSON}

          COPY composer.json composer.lock* ./

          RUN composer install ${COMPOSER_INSTALL_ARGS}

          FROM php:${PHP_VERSION}-fpm-bullseye

          ENV DEBIAN_FRONTEND=noninteractive \\
              APP_DIR=/var/www/html \\
              PHP_FPM_LISTEN=127.0.0.1:9000 \\
              NGINX_PORT=${APP_PORT} \\
              PHP_UPLOAD_MAX_FILESIZE=20M \\
              PHP_POST_MAX_SIZE=20M \\
              PHP_MEMORY_LIMIT=256M \\
              NGINX_CLIENT_MAX_BODY_SIZE=25M \\
              FORCE_HTTPS=${FORCE_HTTPS} \\
              WAIT_FOR_DB=${WAIT_FOR_DB} \\
              RUN_MIGRATIONS=${RUN_MIGRATIONS} \\
              SCHEDULER_ENABLED=${SCHEDULER_ENABLED}

          RUN apt-get update && apt-get install -y --no-install-recommends \\
              git \\
              unzip \\
              nginx \\
              supervisor \\
              curl \\
              ca-certificates \\
              libicu-dev \\
              libzip-dev \\
              libpq-dev \\
              libxml2-dev \\
              libpng-dev \\
              libjpeg-dev \\
              libfreetype6-dev \\
              libonig-dev \\
              && apt-get -y --no-install-recommends install --only-upgrade libgnutls30 \\
              && docker-php-ext-configure gd --with-freetype --with-jpeg \\
              && docker-php-ext-install -j"\$(nproc)" \\
              gd \\
              bcmath \\
              intl \\
              mbstring \\
              pdo_mysql \\
              pdo_pgsql \\
              pcntl \\
              zip \\
              xml \\
              exif \\
              opcache \\
              && rm -rf /var/lib/apt/lists/*

          WORKDIR \${APP_DIR}

          COPY . .
          COPY --from=assets /app/public \${APP_DIR}/public
          COPY --from=vendor /app/vendor ./vendor
          COPY .docker-template/entrypoint.sh /usr/local/bin/entrypoint.sh

          RUN set -eux; \\
              printf '%s\n' \\
              "upload_max_filesize = \${PHP_UPLOAD_MAX_FILESIZE}" \\
              "post_max_size = \${PHP_POST_MAX_SIZE}" \\
              "memory_limit = \${PHP_MEMORY_LIMIT}" \\
              > /usr/local/etc/php/conf.d/99-app.ini

          RUN set -eux; \\
              mkdir -p \${APP_DIR}/storage/logs \${APP_DIR}/bootstrap/cache; \\
              chown -R www-data:www-data \${APP_DIR}; \\
              chmod -R ug+rwX \${APP_DIR}/storage \${APP_DIR}/bootstrap/cache; \\
              chown -R www-data:www-data /var/log/nginx /var/lib/nginx || true; \\
              chown -R www-data:www-data /etc/nginx/conf.d; \\
              sed -i 's/;clear_env = no/clear_env = no/' /usr/local/etc/php-fpm.d/www.conf; \\
              sed -i 's|listen = 9000|listen = \${PHP_FPM_LISTEN}|' /usr/local/etc/php-fpm.d/zz-docker.conf || true

          RUN set -eux; \\
              printf '%s\n' \\
              "pid /tmp/nginx-runtime/nginx.pid;" \\
              "worker_processes auto;" \\
              "error_log /dev/stderr info;" \\
              "events { worker_connections 1024; }" \\
              "http {" \\
              "  include       /etc/nginx/mime.types;" \\
              "  default_type  application/octet-stream;" \\
              "  sendfile      on;" \\
              "  access_log    off;" \\
              "  server_tokens off;" \\
              "  include /etc/nginx/conf.d/*.conf;" \\
              "}" \\
              > /etc/nginx/nginx.conf

          RUN mkdir -p /etc/supervisor/conf.d && \\
              printf '%s\n' \\
              "[supervisord]" \\
              "nodaemon=true" \\
              "" \\
              "[program:php-fpm]" \\
              "command=/usr/local/sbin/php-fpm -F" \\
              "priority=10" \\
              "autostart=true" \\
              "autorestart=true" \\
              "startsecs=5" \\
              "stopasgroup=true" \\
              "killasgroup=true" \\
              "stdout_logfile=/dev/stdout" \\
              "stdout_logfile_maxbytes=0" \\
              "stderr_logfile=/dev/stderr" \\
              "stderr_logfile_maxbytes=0" \\
              "" \\
              "[program:nginx]" \\
              "command=/usr/sbin/nginx -g 'daemon off;'" \\
              "priority=20" \\
              "autostart=true" \\
              "autorestart=true" \\
              "startsecs=5" \\
              "stopasgroup=true" \\
              "killasgroup=true" \\
              "stdout_logfile=/dev/stdout" \\
              "stdout_logfile_maxbytes=0" \\
              "stderr_logfile=/dev/stderr" \\
              "stderr_logfile_maxbytes=0" \\
              "" \\
              "[program:scheduler]" \\
              "directory=/var/www/html" \\
              "user=www-data" \\
              "priority=30" \\
              "autostart=true" \\
              "autorestart=true" \\
              "startsecs=0" \\
              "stopasgroup=true" \\
              "killasgroup=true" \\
              "stdout_logfile=/dev/stdout" \\
              "stdout_logfile_maxbytes=0" \\
              "stderr_logfile=/dev/stderr" \\
              "stderr_logfile_maxbytes=0" \\
              "command=/bin/sh -lc 'if [ \"\${SCHEDULER_ENABLED:-0}\" = \"1\" ]; then while true; do php artisan schedule:work --verbose --no-interaction; sleep 60; done; else tail -f /dev/null; fi'" \\
              > /etc/supervisor/supervisord.conf

          RUN sed -i 's/\r$//' /usr/local/bin/entrypoint.sh && chmod +x /usr/local/bin/entrypoint.sh

          EXPOSE ${APP_PORT}

          HEALTHCHECK --interval=30s --timeout=5s --retries=5 \\
            CMD curl -fsS http://localhost:${APP_PORT}/healthz || exit 1

          USER www-data

          ENTRYPOINT ["/usr/local/bin/entrypoint.sh"]
          CMD ["supervisord", "-c", "/etc/supervisor/supervisord.conf"]
          EOF

          mkdir -p "${CONTEXT_DIR}/.docker-template"
          cat > "${CONTEXT_DIR}/.docker-template/entrypoint.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          APP_DIR="${APP_DIR:-/var/www/html}"
          PHP_FPM_LISTEN="${PHP_FPM_LISTEN:-127.0.0.1:9000}"
          NGINX_PORT="${NGINX_PORT:-9090}"
          FORCE_HTTPS="${FORCE_HTTPS:-1}"
          WAIT_FOR_DB="${WAIT_FOR_DB:-0}"
          RUN_MIGRATIONS="${RUN_MIGRATIONS:-0}"

          NGINX_RUNTIME_DIR="${NGINX_RUNTIME_DIR:-/tmp/nginx-runtime}"
          NGINX_TEMP_DIR="${NGINX_TEMP_DIR:-/tmp/nginx}"

          cd "$APP_DIR" || true
          log() { printf "%s %s\n" "$(date '+%Y-%m-%d %H:%M:%S')" "$*"; }

          ensure_writable_dir() {
            local d="$1"
            if [ ! -e "$d" ]; then
              mkdir -p "$d" || true
            fi
            if [ -w "$d" ] || [ -O "$d" ]; then
              chmod -R ug+rwX "$d" 2>/dev/null || true
            fi
            if ! ( : > "$d/.wtest" 2>/dev/null ); then
              log "Permission denied for $d"
              exit 1
            else
              rm -f "$d/.wtest" || true
            fi
          }

          ensure_writable_dir "${APP_DIR}/storage"
          ensure_writable_dir "${APP_DIR}/storage/logs"
          ensure_writable_dir "${APP_DIR}/bootstrap/cache"

          if [ -f artisan ]; then
            php artisan config:clear || true
          fi

          if [ "${WAIT_FOR_DB}" = "1" ] && [ -n "${DB_HOST:-}" ] && [ -n "${DB_DATABASE:-}" ] && [ -n "${DB_USERNAME:-}" ]; then
            DB_PORT="${DB_PORT:-3306}"
            DB_CONNECTION="${DB_CONNECTION:-mysql}"
            log "Waiting for database ${DB_CONNECTION} at ${DB_HOST}:${DB_PORT}"
            for i in $(seq 1 60); do
              if php -r '
                $driver=getenv("DB_CONNECTION") ?: "mysql";
                $h=getenv("DB_HOST"); $P=getenv("DB_PORT") ?: "3306";
                $d=getenv("DB_DATABASE"); $u=getenv("DB_USERNAME"); $p=getenv("DB_PASSWORD");
                $dsn = $driver === "pgsql"
                  ? "pgsql:host=".$h.";port=".$P.";dbname=".$d
                  : "mysql:host=".$h.";port=".$P.";dbname=".$d.";charset=utf8mb4";
                try {
                  $pdo=new PDO($dsn,$u,$p,[PDO::ATTR_ERRMODE=>PDO::ERRMODE_EXCEPTION,PDO::ATTR_TIMEOUT=>5]);
                  $pdo->query("SELECT 1");
                  exit(0);
                } catch (Throwable $e) { exit(1); }
              '; then
                log "Database is ready"
                break
              fi
              sleep 2
              if [ "$i" -eq 60 ]; then
                log "Timeout waiting for database"
                exit 1
              fi
            done
          fi

          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env || true
          fi

          if [ -f artisan ]; then
            if [ -n "${APP_KEY:-}" ]; then
              log "APP_KEY provided by environment"
            else
              if ! grep -q "^APP_KEY=base64:" .env 2>/dev/null; then
                log "Generating APP_KEY"
                php artisan key:generate --force || true
              fi
            fi
          fi

          if [ "${RUN_MIGRATIONS}" = "1" ] && [ -f artisan ]; then
            log "Running migrations"
            for i in $(seq 1 5); do
              if php artisan migrate --force --no-interaction; then
                log "Migrations completed"
                break
              fi
              sleep 3
              if [ "$i" -eq 5 ]; then
                log "Migrations failed"
                exit 1
              fi
            done
          fi

          if [ -f artisan ]; then
            php artisan optimize:clear || true
            if [ ! -e public/storage ]; then
              php artisan storage:link || true
            fi
          fi

          HTTPS_LINE=""
          if [ "${FORCE_HTTPS}" = "1" ]; then
            HTTPS_LINE="    fastcgi_param HTTPS on;"
          fi

          mkdir -p "${NGINX_RUNTIME_DIR}" "${NGINX_TEMP_DIR}" || true

          cat > /etc/nginx/conf.d/default.conf <<NGINX
          server {
            listen ${NGINX_PORT};
            server_name _;
            root ${APP_DIR}/public;
            index index.php index.html;

            location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

            location / {
              try_files \$uri \$uri/ /index.php?\$query_string;
            }

            location ~ \.php$ {
              include fastcgi_params;
              fastcgi_param SCRIPT_FILENAME \$realpath_root\$fastcgi_script_name;
              fastcgi_param DOCUMENT_ROOT   \$realpath_root;
          ${HTTPS_LINE}
              fastcgi_param HTTP_X_FORWARDED_PROTO \$http_x_forwarded_proto;
              fastcgi_param HTTP_X_FORWARDED_HOST  \$http_host;
              fastcgi_param HTTP_X_FORWARDED_PORT  \$server_port;
              fastcgi_pass ${PHP_FPM_LISTEN};
            }

            client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE:-25M};
          }
          NGINX

          nginx -t && nginx -s reload || true
          log "Application starting"
          exec "$@"
          EOF

      - name: Build and push PHP backend image from template
        id: build-image
        shell: bash
        env:
          COMPOSER_AUTH_JSON: ${{ secrets.COMPOSER_AUTH_JSON }}
        run: |
          set -euxo pipefail

          if [[ -z "${IMAGE_REPOSITORY}" ]]; then
            echo "ERROR: IMAGE_REPOSITORY is empty"
            exit 1
          fi

          IMAGE_REPO_LOWER="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="${REGISTRY}/${IMAGE_REPO_LOWER}"
          SHA_TAG="${IMAGE_BASE}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE_BASE}:latest-${ENVIRONMENT}"
          AMD_TAG="${IMAGE_BASE}:${GITHUB_SHA}-amd64"

          SHOULD_PUSH_LATEST="false"

          docker buildx build "${CONTEXT_DIR}" \
            --file "${RUNNER_TEMP}/Dockerfile.php-template" \
            --build-arg COMPOSER_AUTH_JSON="${COMPOSER_AUTH_JSON}" \
            --platform linux/amd64 \
            --tag "${AMD_TAG}" \
            --push

          docker buildx imagetools create -t "${SHA_TAG}" "${AMD_TAG}"

          IFS=',' read -r -a BRANCHES <<< "${PUSH_LATEST_BRANCHES}"
          for BR in "${BRANCHES[@]}"; do
            BR_TRIMMED="$(echo "${BR}" | xargs)"
            if [[ "${GITHUB_REF_NAME}" == "${BR_TRIMMED}" ]]; then
              SHOULD_PUSH_LATEST="true"
              break
            fi
          done

          if [[ "${SHOULD_PUSH_LATEST}" == "true" ]]; then
            docker buildx imagetools create -t "${LATEST_TAG}" "${AMD_TAG}"
            echo "Published latest tag: ${LATEST_TAG}"
          else
            echo "Skipping latest tag for branch ${GITHUB_REF_NAME}"
          fi

          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Cleanup template files
        if: always()
        shell: bash
        run: |
          rm -rf "${CONTEXT_DIR}/.docker-template"
