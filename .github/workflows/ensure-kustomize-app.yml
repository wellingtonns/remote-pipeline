name: Validate Kustomize

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: false
        type: string
        default: ""
      KUBERNETES_MANIFESTS_PATH:
        required: false
        type: string
        default: "./iac/kubernetes"
      app_name:
        required: false
        type: string
        default: ""
      stack_type:
        required: false
        type: string
        default: ""
      kustomize_path:
        required: false
        type: string
        default: ""
      kustomize_repository:
        required: false
        type: string
        default: ""
      kustomize_ref:
        required: false
        type: string
        default: ""
      kustomize_checkout_path:
        required: false
        type: string
        default: ""
      image_name:
        required: false
        type: string
        default: ""
      image_alias:
        required: false
        type: string
        default: ""
      app_namespace:
        required: false
        type: string
        default: ""
      app_domain:
        required: false
        type: string
        default: ""
      container_port:
        required: false
        type: string
        default: ""
      health_path:
        required: false
        type: string
        default: ""
    secrets:
      PIPELINE_FACTORY_ACTION:
        required: false
      KUSTOMIZE_REPO_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  validate-structure:
    if: github.ref_name == 'dev' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout manifests repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PIPELINE_FACTORY_ACTION || secrets.KUSTOMIZE_REPO_TOKEN }}
          repository: ${{ inputs.kustomize_repository || 'Collegia-Partners/workloads' }}
          ref: ${{ inputs.kustomize_ref || 'main' }}
          fetch-depth: 0

      - name: Ensure app structure from iac-model
        id: structure
        shell: bash
        run: |
          set -euo pipefail

          REPO_NAME="${{ inputs.app_name }}"
          if [[ -z "$REPO_NAME" ]]; then
            REPO_NAME="${{ github.event.repository.name }}"
          fi

          APP_NAME="$REPO_NAME"

          APP_NAME="${APP_NAME%-dev}"
          APP_NAME="${APP_NAME%-prd}"
          APP_NAME="$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]')"

          TEMPLATE_DIR="iac-model"
          TARGET_DIR="apps/${APP_NAME}"
          KUSTOMIZE_PATH="${{ inputs.kustomize_path }}"
          STACK_TYPE="${{ inputs.stack_type }}"
          APP_NAMESPACE="${{ inputs.app_namespace }}"
          APP_DOMAIN="${{ inputs.app_domain }}"
          CONTAINER_PORT="${{ inputs.container_port }}"
          HEALTH_PATH="${{ inputs.health_path }}"
          IMAGE_ALIAS="${{ inputs.image_alias }}"
          IMAGE_NAME="${{ inputs.image_name }}"

          if [[ -z "$APP_NAMESPACE" ]]; then
            APP_NAMESPACE="$APP_NAME"
          fi

          if [[ -z "$APP_DOMAIN" ]]; then
            APP_DOMAIN="$APP_NAME.example.com"
          fi

          if [[ -z "$CONTAINER_PORT" ]]; then
            if [[ "$STACK_TYPE" == "backend" ]]; then
              CONTAINER_PORT="3000"
            else
              CONTAINER_PORT="8080"
            fi
          fi

          if [[ -z "$HEALTH_PATH" ]]; then
            if [[ "$STACK_TYPE" == "backend" ]]; then
              HEALTH_PATH="/health"
            else
              HEALTH_PATH="/"
            fi
          fi

          if [[ -z "$IMAGE_ALIAS" ]]; then
            IMAGE_ALIAS="$IMAGE_NAME"
          fi

          if [[ -d "$TEMPLATE_DIR" ]]; then
            TARGET_DIR="apps/${APP_NAME}"
            if [[ -d "$TARGET_DIR" ]]; then
              echo "App directory already exists: $TARGET_DIR"
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
              echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            mkdir -p "apps"
            cp -R "$TEMPLATE_DIR" "$TARGET_DIR"
            find "$TARGET_DIR" -type f -exec sed -i "s/{{APP_NAME}}/$APP_NAME/g" {} +

            echo "Created app structure at: $TARGET_DIR"
            echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
            echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$KUSTOMIZE_PATH" ]]; then
            echo "Template directory not found: $TEMPLATE_DIR"
            echo "kustomize_path was not provided, so no fallback overlay can be created."
            exit 1
          fi

          TARGET_DIR="$KUSTOMIZE_PATH"

          if [[ -d "$TARGET_DIR" ]]; then
            echo "App directory already exists: $TARGET_DIR"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
            echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! -d "base" ]]; then
            echo "Template directory not found: $TEMPLATE_DIR"
            echo "Fallback base directory not found: base"
            exit 1
          fi

          mkdir -p "$TARGET_DIR"

          cat > "$TARGET_DIR/kustomization.yaml" <<EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          namespace: $APP_NAMESPACE
          namePrefix: $APP_NAME-

          resources:
            - namespace.yaml
            - ../../base

          images:
            - name: $IMAGE_ALIAS
              newName: $IMAGE_NAME
              newTag: latest

          patches:
            - path: deployment-patch.yaml
            - path: ingress-patch.yaml

          commonLabels:
            app.kubernetes.io/part-of: $APP_NAME
          EOF

          cat > "$TARGET_DIR/namespace.yaml" <<EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: $APP_NAMESPACE
          EOF

          cat > "$TARGET_DIR/deployment-patch.yaml" <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: app
          spec:
            replicas: 2
            template:
              spec:
                containers:
                  - name: app
                    ports:
                      - name: http
                        containerPort: $CONTAINER_PORT
                    env:
                      - name: NODE_ENV
                        value: production
                    readinessProbe:
                      httpGet:
                        path: $HEALTH_PATH
                        port: http
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: $HEALTH_PATH
                        port: http
                      initialDelaySeconds: 30
                      periodSeconds: 20
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
          EOF

          cat > "$TARGET_DIR/ingress-patch.yaml" <<EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: app
          spec:
            rules:
              - host: $APP_DOMAIN
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: app
                          port:
                            name: http
          EOF

          echo "Created app structure at: $TARGET_DIR"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "target_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Show resulting structure
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="${{ steps.structure.outputs.target_dir }}"
          find "$TARGET_DIR" -type f | sort

      - name: Commit changes
        if: steps.structure.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "collegia-bot"
          git config user.email "devops@collegia.co.uk"

          git add "${{ steps.structure.outputs.target_dir }}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(kustomize): bootstrap app from iac-model for ${{ steps.structure.outputs.app_name }}"
          git push origin "HEAD:main"
