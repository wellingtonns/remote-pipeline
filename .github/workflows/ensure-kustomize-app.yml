name: Validate Kustomize

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: false
        type: string
        default: ""
      KUBERNETES_MANIFESTS_PATH:
        required: false
        type: string
        default: "./iac/kubernetes"
      app_name:
        required: false
        type: string
        default: ""
      stack_type:
        required: false
        type: string
        default: ""
      kustomize_path:
        required: false
        type: string
        default: ""
      kustomize_repository:
        required: false
        type: string
        default: ""
      kustomize_ref:
        required: false
        type: string
        default: ""
      kustomize_checkout_path:
        required: false
        type: string
        default: ""
      image_name:
        required: false
        type: string
        default: ""
      image_alias:
        required: false
        type: string
        default: ""
      app_namespace:
        required: false
        type: string
        default: ""
      app_domain:
        required: false
        type: string
        default: ""
      container_port:
        required: false
        type: string
        default: ""
      health_path:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  validate-structure:
    if: github.ref_name == 'dev' || github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout manifests repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PIPELINE_FACTORY_ACTION }}
          repository: Collegia-Partners/workloads
          ref: main
          fetch-depth: 0

      - name: Ensure app structure from iac-model
        id: structure
        shell: bash
        run: |
          set -euo pipefail

          REPO_NAME="${{ github.event.repository.name }}"
          APP_NAME="$REPO_NAME"

          APP_NAME="${APP_NAME%-dev}"
          APP_NAME="${APP_NAME%-prd}"
          APP_NAME="$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]')"

          TEMPLATE_DIR="iac-model"
          TARGET_DIR="apps/${APP_NAME}"

          if [[ ! -d "$TEMPLATE_DIR" ]]; then
            echo "Template directory not found: $TEMPLATE_DIR"
            exit 1
          fi

          if [[ -d "$TARGET_DIR" ]]; then
            echo "App directory already exists: $TARGET_DIR"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p "apps"
          cp -R "$TEMPLATE_DIR" "$TARGET_DIR"
          find "$TARGET_DIR" -type f -exec sed -i "s/{{APP_NAME}}/$APP_NAME/g" {} +

          echo "Created app structure at: $TARGET_DIR"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Show resulting structure
        shell: bash
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.structure.outputs.app_name }}"
          find "apps/${APP_NAME}" -type f | sort

      - name: Commit changes
        if: steps.structure.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "collegia-bot"
          git config user.email "devops@collegia.co.uk"

          git add "apps/${{ steps.structure.outputs.app_name }}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(kustomize): bootstrap app from iac-model for ${{ steps.structure.outputs.app_name }}"
          git push origin "HEAD:main"
