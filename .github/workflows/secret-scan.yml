name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan_path:
        description: "Pasta que sera analisada."
        required: false
        type: string
        default: .
      fail_on_leak:
        description: "Falhar o workflow quando uma secret for encontrada."
        required: false
        type: boolean
        default: true
      run_gitleaks:
        description: "Executar Gitleaks para detectar padroes conhecidos de credenciais."
        required: false
        type: boolean
        default: true
      gitleaks_image:
        description: "Imagem Docker do Gitleaks. Use uma tag fixa se quiser builds reproduziveis."
        required: false
        type: string
        default: ghcr.io/gitleaks/gitleaks:latest
      gitleaks_config_path:
        description: "Caminho opcional para um arquivo .gitleaks.toml no repositorio."
        required: false
        type: string
        default: ""
      run_trufflehog:
        description: "Executar TruffleHog para validar segredos detectaveis."
        required: false
        type: boolean
        default: true
      trufflehog_extra_args:
        description: "Argumentos extras do TruffleHog."
        required: false
        type: string
        default: --only-verified

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate scan inputs
        shell: bash
        env:
          SCAN_PATH: ${{ inputs.scan_path }}
          GITLEAKS_CONFIG_PATH: ${{ inputs.gitleaks_config_path }}
        run: |
          set -euo pipefail

          for path in "$SCAN_PATH" "$GITLEAKS_CONFIG_PATH"; do
            if [[ -z "$path" ]]; then
              continue
            fi

            if [[ "$path" = /* || "$path" == *".."* ]]; then
              echo "::error::Invalid path: $path"
              exit 1
            fi
          done

          if [[ ! -e "$SCAN_PATH" ]]; then
            echo "::error::scan_path does not exist: $SCAN_PATH"
            exit 1
          fi

          if [[ -n "$GITLEAKS_CONFIG_PATH" && ! -f "$GITLEAKS_CONFIG_PATH" ]]; then
            echo "::error::gitleaks_config_path does not exist: $GITLEAKS_CONFIG_PATH"
            exit 1
          fi

      - name: Run Gitleaks
        if: ${{ inputs.run_gitleaks }}
        shell: bash
        env:
          FAIL_ON_LEAK: ${{ inputs.fail_on_leak }}
          GITLEAKS_CONFIG_PATH: ${{ inputs.gitleaks_config_path }}
          GITLEAKS_IMAGE: ${{ inputs.gitleaks_image }}
          SCAN_PATH: ${{ inputs.scan_path }}
        run: |
          set -euo pipefail

          config_args=()
          if [[ -n "$GITLEAKS_CONFIG_PATH" ]]; then
            config_args=(--config "/repo/$GITLEAKS_CONFIG_PATH")
          fi

          exit_code=0
          docker run --rm \
            -v "$PWD:/repo" \
            "$GITLEAKS_IMAGE" \
            detect \
            --source "/repo/$SCAN_PATH" \
            --redact \
            --verbose \
            --exit-code 1 \
            "${config_args[@]}" || exit_code=$?

          if [[ "$exit_code" -ne 0 ]]; then
            echo "::error::Gitleaks found possible exposed secrets."
            if [[ "$FAIL_ON_LEAK" == "true" ]]; then
              exit "$exit_code"
            fi
          fi

      - name: Run TruffleHog
        if: ${{ inputs.run_trufflehog }}
        uses: trufflesecurity/trufflehog@main
        continue-on-error: ${{ !inputs.fail_on_leak }}
        with:
          path: ${{ inputs.scan_path }}
          extra_args: ${{ inputs.trufflehog_extra_args }}
