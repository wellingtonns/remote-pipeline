name: Build and Push Frontend Image

on:
  workflow_call:
    inputs:
      REGISTRY:
        required: false
        type: string
        default: ghcr.io
      IMAGE_REPOSITORY:
        required: false
        type: string
        default: ${{ github.repository }}
      STACK_TYPE:
        required: false
        type: string
        default: front
      CONTEXT_DIR:
        required: false
        type: string
        default: .
      APPLICATION:
        required: false
        type: string
        default: ""
      ENVIRONMENT:
        required: false
        type: string
        default: dev
      NODE_VERSION:
        required: false
        type: string
        default: "20"
      NODE_MAX_OLD_SPACE_MB:
        required: false
        type: string
        default: "6144"
      NIXPACKS_BUILD_CMD:
        required: false
        type: string
        default: ""
      NIXPACKS_START_CMD:
        required: false
        type: string
        default: ""
      PUSH_LATEST_BRANCHES:
        required: false
        type: string
        default: "dev,main"
    outputs:
      image:
        description: "Built frontend image with SHA tag"
        value: ${{ jobs.build.outputs.image }}

env:
  REGISTRY: ${{ inputs.REGISTRY }}
  IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
  STACK_TYPE: ${{ inputs.STACK_TYPE }}
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
  APPLICATION: ${{ inputs.APPLICATION }}
  ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
  NODE_VERSION: ${{ inputs.NODE_VERSION }}
  NODE_MAX_OLD_SPACE_MB: ${{ inputs.NODE_MAX_OLD_SPACE_MB }}
  NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
  NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
  PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-image-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    environment:
      name: ${{ inputs.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Nixpacks build and push frontend image
        id: build-image
        shell: bash
        env:
          FRONTEND_VARS_JSON: ${{ toJson(vars) }}
          REGISTRY: ${{ inputs.REGISTRY }}
          IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
          STACK_TYPE: ${{ inputs.STACK_TYPE }}
          CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          NODE_VERSION: ${{ inputs.NODE_VERSION }}
          NODE_MAX_OLD_SPACE_MB: ${{ inputs.NODE_MAX_OLD_SPACE_MB }}
          NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
          NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
          PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}
        run: |
          set -euxo pipefail

          curl -fsSL https://nixpacks.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          if [[ -z "${IMAGE_REPOSITORY}" ]]; then
            echo "ERROR: IMAGE_REPOSITORY is empty"
            exit 1
          fi

          IMAGE_REPO_LOWER="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="${REGISTRY}/${IMAGE_REPO_LOWER}"

          SHA_TAG="${IMAGE_BASE}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE_BASE}:latest-${ENVIRONMENT}"
          AMD_TAG="${IMAGE_BASE}:${GITHUB_SHA}-amd64"

          SHOULD_PUSH_LATEST="false"
          FRONTEND_ENV_ARGS=()
          NIXPACKS_CMD_ARGS=()
          FRONTEND_ENV_FILE="${CONTEXT_DIR%/}/.env.local"

          mkdir -p "${CONTEXT_DIR}"
          : > "${FRONTEND_ENV_FILE}"

          while IFS= read -r ENTRY; do
            KEY="$(jq -r '.key' <<< "${ENTRY}")"
            VALUE="$(jq -r '.value | tostring' <<< "${ENTRY}")"

            FRONTEND_ENV_ARGS+=(--env "${KEY}=${VALUE}")

            ESCAPED_VALUE="${VALUE//\\/\\\\}"
            ESCAPED_VALUE="${ESCAPED_VALUE//\"/\\\"}"

            set +x
            printf '%s="%s"\n' "${KEY}" "${ESCAPED_VALUE}" >> "${FRONTEND_ENV_FILE}"
            set -x
          done < <(
            jq -c '
              to_entries[]
              | select(.key | test("^(NEXT_PUBLIC_|REACT_APP_|VITE_)"))
            ' <<< "${FRONTEND_VARS_JSON}"
          )

          echo "Prepared $(wc -l < "${FRONTEND_ENV_FILE}" | xargs) frontend environment variables"

          case "${STACK_TYPE}" in
            front|react)
              echo "Using React stack"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--build-cmd "npm install && npm run build")
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--start-cmd "npx --yes serve -s build -l 3000")
              fi
              ;;

            next)
              echo "Using Next.js stack"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--build-cmd "npm install && npm run build")
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--start-cmd "npm start")
              fi
              ;;

            *)
              echo "ERROR: Unsupported frontend STACK_TYPE: ${STACK_TYPE}"
              echo "Allowed values: front, react, next"
              exit 1
              ;;
          esac

          timeout 20m nixpacks build "${CONTEXT_DIR}" \
            --env APP_ENV="${ENVIRONMENT}" \
            --env NIXPACKS_NODE_VERSION="${NODE_VERSION}" \
            --env NODE_OPTIONS="--max_old_space_size=${NODE_MAX_OLD_SPACE_MB}" \
            "${FRONTEND_ENV_ARGS[@]}" \
            "${NIXPACKS_CMD_ARGS[@]}" \
            --platform linux/amd64 \
            --tag "${AMD_TAG}"

          docker push "${AMD_TAG}"

          docker buildx imagetools create -t "${SHA_TAG}" "${AMD_TAG}"

          IFS=',' read -r -a BRANCHES <<< "${PUSH_LATEST_BRANCHES}"

          for BR in "${BRANCHES[@]}"; do
            BR_TRIMMED="$(echo "${BR}" | xargs)"

            if [[ "${GITHUB_REF_NAME}" == "${BR_TRIMMED}" ]]; then
              SHOULD_PUSH_LATEST="true"
              break
            fi
          done

          if [[ "${SHOULD_PUSH_LATEST}" == "true" ]]; then
            docker buildx imagetools create -t "${LATEST_TAG}" "${AMD_TAG}"
            echo "Published latest tag: ${LATEST_TAG}"
          else
            echo "Skipping latest tag for branch ${GITHUB_REF_NAME}"
          fi

          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"