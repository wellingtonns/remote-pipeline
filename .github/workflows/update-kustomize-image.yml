name: Reusable Update Kustomize Image

on:
  workflow_call:
    inputs:
      kustomize_path:
        description: "Caminho do overlay dentro do repositorio Kustomize. Exemplo app/app-clinica."
        required: true
        type: string
      kustomize_repository:
        description: "Repositorio que contem os manifests Kustomize. Exemplo wellingtonns/workloads."
        required: true
        type: string
      kustomize_ref:
        description: "Branch do repositorio Kustomize."
        required: false
        type: string
        default: main
      kustomize_checkout_path:
        description: "Pasta local onde o repositorio Kustomize sera clonado."
        required: false
        type: string
        default: workloads
      image_name:
        description: "Nome real da imagem que ficara em newName."
        required: true
        type: string
      image_alias:
        description: "Nome da imagem na base Kustomize. Use app-image para a base compartilhada."
        required: false
        type: string
        default: ""
      image_tag:
        description: "Nova tag que sera gravada em newTag."
        required: true
        type: string
      commit_message:
        description: "Mensagem do commit de atualizacao."
        required: false
        type: string
        default: "chore: update kustomize image tag"
      git_user_name:
        description: "Usuario Git para o commit."
        required: false
        type: string
        default: "github-actions[bot]"
      git_user_email:
        description: "Email Git para o commit."
        required: false
        type: string
        default: "41898282+github-actions[bot]@users.noreply.github.com"
    secrets:
      KUSTOMIZE_REPO_TOKEN:
        required: false
      PIPELINE_FACTORY_ACTION:
        required: false

jobs:
  update:
    name: Update image tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate Kustomize write token
        shell: bash
        env:
          CURRENT_REPOSITORY: ${{ github.repository }}
          TARGET_REPOSITORY: ${{ inputs.kustomize_repository }}
          KUSTOMIZE_REPO_TOKEN: ${{ secrets.KUSTOMIZE_REPO_TOKEN }}
          PIPELINE_FACTORY_ACTION: ${{ secrets.PIPELINE_FACTORY_ACTION }}
        run: |
          if [[ "$CURRENT_REPOSITORY" != "$TARGET_REPOSITORY" && -z "$KUSTOMIZE_REPO_TOKEN" && -z "$PIPELINE_FACTORY_ACTION" ]]; then
            echo "Missing KUSTOMIZE_REPO_TOKEN or PIPELINE_FACTORY_ACTION."
            echo "The workflow is running from $CURRENT_REPOSITORY, but needs to push changes to $TARGET_REPOSITORY."
            echo "Create one of these secrets with Contents: Read and write access to $TARGET_REPOSITORY."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.kustomize_repository }}
          ref: ${{ inputs.kustomize_ref }}
          path: ${{ inputs.kustomize_checkout_path }}
          token: ${{ secrets.KUSTOMIZE_REPO_TOKEN || secrets.PIPELINE_FACTORY_ACTION || github.token }}
          persist-credentials: true

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Resolve Kustomize path
        id: kustomize
        shell: bash
        run: |
          set -euo pipefail

          BASE_PATH="${{ inputs.kustomize_checkout_path }}/${{ inputs.kustomize_path }}"

          if [[ -f "$BASE_PATH/kustomization.yaml" || -f "$BASE_PATH/kustomization.yml" ]]; then
            echo "path=$BASE_PATH" >> "$GITHUB_OUTPUT"
            echo "relative_path=${{ inputs.kustomize_path }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            OVERLAY_NAME="dev"
          elif [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "master" ]]; then
            OVERLAY_NAME="prd"
          else
            echo "Branch not supported for overlay selection: ${{ github.ref_name }}"
            exit 1
          fi

          OVERLAY_PATH="$BASE_PATH/overlays/$OVERLAY_NAME"
          if [[ ! -f "$OVERLAY_PATH/kustomization.yaml" && ! -f "$OVERLAY_PATH/kustomization.yml" ]]; then
            echo "Kustomization file not found in $OVERLAY_PATH"
            exit 1
          fi

          echo "path=$OVERLAY_PATH" >> "$GITHUB_OUTPUT"
          echo "relative_path=${{ inputs.kustomize_path }}/overlays/$OVERLAY_NAME" >> "$GITHUB_OUTPUT"

      - name: Update image tag with Kustomize
        working-directory: ${{ steps.kustomize.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_ALIAS="${{ inputs.image_alias }}"
          if [ -z "$IMAGE_ALIAS" ]; then
            IMAGE_ALIAS="${{ inputs.image_name }}"
          fi

          kustomize edit set image "$IMAGE_ALIAS=${{ inputs.image_name }}:${{ inputs.image_tag }}"
          kustomize build .

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "${{ inputs.git_user_name }}"
          git config user.email "${{ inputs.git_user_email }}"
          cd "${{ inputs.kustomize_checkout_path }}"

          if git diff --quiet; then
            echo "No Kustomize changes to commit."
            exit 0
          fi

          git add "${{ steps.kustomize.outputs.relative_path }}/kustomization.yaml"
          git commit -m "${{ inputs.commit_message }}: ${{ inputs.image_tag }}"
          git push
