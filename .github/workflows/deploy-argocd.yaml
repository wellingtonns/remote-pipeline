name: Sync ArgoCD Application
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      APPLICATION:
        required: false
        type: string

env:
  ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
  APPLICATION: ${{ inputs.APPLICATION }}


permissions:
  id-token: write
  contents: write 
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  synchronizer:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.ENVIRONMENT }}
    steps:
      - name: Check environment for branch
        run: |
          if [[ $GITHUB_REF_NAME != 'main' && $ENVIRONMENT == "prd" ]]; then
              echo "Deploy on Production environment is only allowed from main branch"
              exit 1
          else
              echo "Deploying on $environment environment from $GITHUB_REF_NAME branch"
          fi

      - name: Argocd Sync Application
        uses: Collegia-Partners/argocd-sync-application-action@v1.0.0
        with:
          environment: ${{ env.ENVIRONMENT }}
          argocd-host: ${{ secrets.ARGOCD_URL }}
          argocd-user: ${{ secrets.ARGOCD_USER }}
          argocd-password: ${{ secrets.ARGOCD_PASS }}
          argocd-application: ${{ env.APPLICATION }}-${{ env.ENVIRONMENT }}

