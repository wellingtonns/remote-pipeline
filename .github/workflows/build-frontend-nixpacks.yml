name: Reusable Build Frontend With Nixpacks

on:
  workflow_call:
    inputs:
      app_name:
        description: "Nome logico da aplicacao."
        required: true
        type: string
      context:
        description: "Pasta do projeto frontend."
        required: false
        type: string
        default: .
      image_name:
        description: "Nome completo da imagem sem tag. Exemplo ghcr.io/org/app-frontend."
        required: true
        type: string
      registry:
        description: "Registry usado no login."
        required: false
        type: string
        default: ghcr.io
      image_tag:
        description: "Tag da imagem. Quando vazio, usa o SHA curto do commit."
        required: false
        type: string
        default: ""
      push:
        description: "Publicar imagem no registry."
        required: false
        type: boolean
        default: true
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false
    outputs:
      image:
        description: Imagem publicada com tag.
        value: ${{ jobs.build.outputs.image }}
      image_tag:
        description: Tag usada no build.
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || github.token }}

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="${GITHUB_SHA::12}"
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ inputs.image_name }}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Install Nixpacks
        shell: bash
        run: |
          curl -sSL https://nixpacks.com/install.sh | bash
          echo "$HOME/.nixpacks/bin" >> "$GITHUB_PATH"

      - name: Build frontend image
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          nixpacks build "${{ inputs.context }}" --name "$IMAGE"

      - name: Push frontend image
        if: ${{ inputs.push }}
        shell: bash
        run: docker push "${{ steps.meta.outputs.image }}"
