name: Build and Push Backend Image

on:
  workflow_call:
    inputs:
      REGISTRY:
        required: false
        type: string
        default: ghcr.io

      IMAGE_REPOSITORY:
        required: false
        type: string
        default: ${{ github.repository }}

      STACK_TYPE:
        required: false
        type: string
        default: back

      CONTEXT_DIR:
        required: false
        type: string
        default: .

      APPLICATION:
        required: false
        type: string
        default: ""

      ENVIRONMENT:
        required: false
        type: string
        default: dev
      STACK_VERSION:
        required: false
        type: string
        default: ""

      NIXPACKS_BUILD_CMD:
        required: false
        type: string
        default: ""

      NIXPACKS_START_CMD:
        required: false
        type: string
        default: ""

      PUSH_LATEST_BRANCHES:
        required: false
        type: string
        default: "dev,main"

    outputs:
      image:
        description: "Built backend image with SHA tag"
        value: ${{ jobs.build.outputs.image }}

env:
  REGISTRY: ${{ inputs.REGISTRY }}
  IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
  STACK_TYPE: ${{ inputs.STACK_TYPE }}
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
  APPLICATION: ${{ inputs.APPLICATION }}
  ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
  STACK_VERSION: ${{ inputs.STACK_VERSION }}
  NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
  NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
  PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Image ${{ inputs.STACK_TYPE }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    environment:
      name: ${{ inputs.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Nixpacks build and push backend image
        id: build-image
        shell: bash
        env:
          STACK_TYPE: ${{ inputs.STACK_TYPE }}
          CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
          REGISTRY: ${{ inputs.REGISTRY }}
          IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          STACK_VERSION: ${{ inputs.STACK_VERSION }}
          NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
          NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
          PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}
        run: |
          set -euxo pipefail

          add_nixpacks_cmd_arg() {
            local flag="$1"
            local value="$2"

            if [[ -n "${value}" ]]; then
              NIXPACKS_CMD_ARGS+=("${flag}" "${value}")
            fi
          }

          add_nixpacks_env() {
            local name="$1"
            local value="$2"

            if [[ -n "${name}" && -n "${value}" ]]; then
              NIXPACKS_ENV_ARGS+=(--env "${name}=${value}")
            fi
          }

          detect_stack_type() {
            echo "Detecting backend stack automatically..." >&2

            if [[ -f "${CONTEXT_DIR}/pom.xml" || -f "${CONTEXT_DIR}/build.gradle" || -f "${CONTEXT_DIR}/gradlew" ]]; then
              echo "java"
            elif [[ -f "${CONTEXT_DIR}/requirements.txt" || -f "${CONTEXT_DIR}/pyproject.toml" || -f "${CONTEXT_DIR}/app.py" || -f "${CONTEXT_DIR}/main.py" ]]; then
              echo "python"
            elif [[ -f "${CONTEXT_DIR}/go.mod" ]]; then
              echo "go"
            elif [[ -f "${CONTEXT_DIR}/composer.json" ]]; then
              echo "php"
            elif compgen -G "${CONTEXT_DIR}/*.csproj" > /dev/null; then
              echo "dotnet"
            else
              echo "Could not detect a known backend language. Using generic Nixpacks backend build." >&2
              echo "generic"
            fi
          }

          # Install Nixpacks in the runner.
          curl -fsSL https://nixpacks.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          if [[ -z "${IMAGE_REPOSITORY}" ]]; then
            echo "ERROR: IMAGE_REPOSITORY is empty"
            exit 1
          fi

          # Resolve image tags used during build and publish.
          IMAGE_REPO_LOWER="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="${REGISTRY}/${IMAGE_REPO_LOWER}"

          SHA_TAG="${IMAGE_BASE}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE_BASE}:latest-${ENVIRONMENT}"
          AMD_TAG="${IMAGE_BASE}:${GITHUB_SHA}-amd64"

          SHOULD_PUSH_LATEST="false"
          NIXPACKS_CMD_ARGS=()
          NIXPACKS_ENV_ARGS=()
          DEFAULT_BUILD_CMD=""
          DEFAULT_START_CMD=""
          RUNTIME_ENV_NAME=""
          ASSET_NODE_VERSION=""

          case "${STACK_TYPE}" in
            ""|back|backend|api)
              STACK_TYPE="$(detect_stack_type)"
              ;;
            backend-*)
              STACK_TYPE="${STACK_TYPE#backend-}"
              ;;
          esac

          if [[ "${STACK_TYPE}" == "laravel" ]]; then
            STACK_TYPE="php"
          fi

          case "${STACK_TYPE}" in
            python)
              echo "Using Python stack"
              RUNTIME_ENV_NAME="NIXPACKS_PYTHON_VERSION"
              [[ -f "${CONTEXT_DIR}/requirements.txt" ]] && DEFAULT_BUILD_CMD="pip install -r requirements.txt"
              [[ -f "${CONTEXT_DIR}/app.py" ]] && DEFAULT_START_CMD="python app.py"
              [[ -z "${DEFAULT_START_CMD}" && -f "${CONTEXT_DIR}/main.py" ]] && DEFAULT_START_CMD="python main.py"
              ;;
            go)
              echo "Using Go stack"
              RUNTIME_ENV_NAME="NIXPACKS_GO_VERSION"
              DEFAULT_BUILD_CMD="go mod download && go build -o app"
              DEFAULT_START_CMD="./app"
              ;;
            java)
              echo "Using Java stack"
              RUNTIME_ENV_NAME="NIXPACKS_JAVA_VERSION"

              if [[ -f "${CONTEXT_DIR}/pom.xml" ]]; then
                DEFAULT_BUILD_CMD="mvn clean package -DskipTests"
                DEFAULT_START_CMD="java -jar target/*.jar"
              elif [[ -f "${CONTEXT_DIR}/build.gradle" || -f "${CONTEXT_DIR}/gradlew" ]]; then
                DEFAULT_BUILD_CMD="./gradlew build -x test"
                DEFAULT_START_CMD="java -jar build/libs/*.jar"
              else
                echo "ERROR: Java project detected, but no pom.xml, build.gradle or gradlew found."
                exit 1
              fi
              ;;
            php)
              echo "Using PHP stack"
              RUNTIME_ENV_NAME="NIXPACKS_PHP_VERSION"
              # Laravel/PHP projects often compile frontend assets during the
              # backend build, so keep a modern Node fallback for Vite.
              ASSET_NODE_VERSION="22"
              ;;
            dotnet)
              echo "Using .NET stack"
              ;;
            generic)
              echo "Using generic backend stack with Nixpacks auto-detection"
              ;;
            *)
              echo "ERROR: Unsupported backend STACK_TYPE: ${STACK_TYPE}"
              echo "Allowed values: java, python, go, php, laravel, dotnet, back, backend, api"
              exit 1
              ;;
          esac

          add_nixpacks_env "${RUNTIME_ENV_NAME}" "${STACK_VERSION}"
          add_nixpacks_env "NIXPACKS_NODE_VERSION" "${ASSET_NODE_VERSION}"
          add_nixpacks_cmd_arg --build-cmd "${NIXPACKS_BUILD_CMD:-$DEFAULT_BUILD_CMD}"
          add_nixpacks_cmd_arg --start-cmd "${NIXPACKS_START_CMD:-$DEFAULT_START_CMD}"

          # Build the image locally with Nixpacks before pushing it.
          timeout 20m nixpacks build "${CONTEXT_DIR}" \
            --env APP_ENV="${ENVIRONMENT}" \
            "${NIXPACKS_ENV_ARGS[@]}" \
            "${NIXPACKS_CMD_ARGS[@]}" \
            --platform linux/amd64 \
            --tag "${AMD_TAG}"

          docker push "${AMD_TAG}"
          docker buildx imagetools create -t "${SHA_TAG}" "${AMD_TAG}"

          # Publish latest-environment tag only for allowed branches.
          IFS=',' read -r -a BRANCHES <<< "${PUSH_LATEST_BRANCHES}"

          for BR in "${BRANCHES[@]}"; do
            BR_TRIMMED="$(echo "${BR}" | xargs)"

            if [[ "${GITHUB_REF_NAME}" == "${BR_TRIMMED}" ]]; then
              SHOULD_PUSH_LATEST="true"
              break
            fi
          done

          if [[ "${SHOULD_PUSH_LATEST}" == "true" ]]; then
            docker buildx imagetools create -t "${LATEST_TAG}" "${AMD_TAG}"
            echo "Published latest tag: ${LATEST_TAG}"
          else
            echo "Skipping latest tag for branch ${GITHUB_REF_NAME}"
          fi

          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"
