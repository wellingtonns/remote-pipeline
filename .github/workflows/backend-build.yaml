name: Build and Push Backend Image

on:
  workflow_call:
    inputs:
      REGISTRY:
        required: false
        type: string
        default: ghcr.io

      IMAGE_REPOSITORY:
        required: false
        type: string
        default: ${{ github.repository }}

      STACK_TYPE:
        required: false
        type: string
        default: back

      CONTEXT_DIR:
        required: false
        type: string
        default: .

      APPLICATION:
        required: false
        type: string
        default: ""

      ENVIRONMENT:
        required: false
        type: string
        default: dev
      NODE_VERSION:
        required: false
        type: string
        default: "20"

      NIXPACKS_BUILD_CMD:
        required: false
        type: string
        default: ""

      NIXPACKS_START_CMD:
        required: false
        type: string
        default: ""

      PUSH_LATEST_BRANCHES:
        required: false
        type: string
        default: "dev,main"

    outputs:
      image:
        description: "Built backend image with SHA tag"
        value: ${{ jobs.build.outputs.image }}

env:
  REGISTRY: ${{ inputs.REGISTRY }}
  IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
  STACK_TYPE: ${{ inputs.STACK_TYPE }}
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
  APPLICATION: ${{ inputs.APPLICATION }}
  ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
  NODE_VERSION: ${{ inputs.NODE_VERSION }}
  NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
  NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
  PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-image-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    environment:
      name: ${{ inputs.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Nixpacks build and push backend image
        id: build-image
        shell: bash
        env:
          STACK_TYPE: ${{ inputs.STACK_TYPE }}
          CONTEXT_DIR: ${{ inputs.CONTEXT_DIR }}
          REGISTRY: ${{ inputs.REGISTRY }}
          IMAGE_REPOSITORY: ${{ inputs.IMAGE_REPOSITORY }}
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          NODE_VERSION: ${{ inputs.NODE_VERSION }}
          NIXPACKS_BUILD_CMD: ${{ inputs.NIXPACKS_BUILD_CMD }}
          NIXPACKS_START_CMD: ${{ inputs.NIXPACKS_START_CMD }}
          PUSH_LATEST_BRANCHES: ${{ inputs.PUSH_LATEST_BRANCHES }}
        run: |
          set -euxo pipefail

          curl -fsSL https://nixpacks.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"

          if [[ -z "${IMAGE_REPOSITORY}" ]]; then
            echo "ERROR: IMAGE_REPOSITORY is empty"
            exit 1
          fi

          IMAGE_REPO_LOWER="$(echo "${IMAGE_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_BASE="${REGISTRY}/${IMAGE_REPO_LOWER}"

          SHA_TAG="${IMAGE_BASE}:${GITHUB_SHA}"
          LATEST_TAG="${IMAGE_BASE}:latest-${ENVIRONMENT}"
          AMD_TAG="${IMAGE_BASE}:${GITHUB_SHA}-amd64"

          SHOULD_PUSH_LATEST="false"
          NIXPACKS_CMD_ARGS=()

          if [[ -z "${STACK_TYPE}" || "${STACK_TYPE}" == "back" || "${STACK_TYPE}" == "backend" || "${STACK_TYPE}" == "api" ]]; then
            echo "Detecting backend stack automatically..."

            if [[ -f "${CONTEXT_DIR}/pom.xml" || -f "${CONTEXT_DIR}/build.gradle" || -f "${CONTEXT_DIR}/gradlew" ]]; then
              STACK_TYPE="java"
            elif [[ -f "${CONTEXT_DIR}/requirements.txt" || -f "${CONTEXT_DIR}/pyproject.toml" || -f "${CONTEXT_DIR}/app.py" || -f "${CONTEXT_DIR}/main.py" ]]; then
              STACK_TYPE="python"
            elif [[ -f "${CONTEXT_DIR}/go.mod" ]]; then
              STACK_TYPE="go"
            elif [[ -f "${CONTEXT_DIR}/package.json" ]]; then
              STACK_TYPE="node"
            elif [[ -f "${CONTEXT_DIR}/composer.json" ]]; then
              STACK_TYPE="php"
            elif [[ -f "${CONTEXT_DIR}/Gemfile" ]]; then
              STACK_TYPE="ruby"
            elif [[ -f "${CONTEXT_DIR}/Cargo.toml" ]]; then
              STACK_TYPE="rust"
            elif compgen -G "${CONTEXT_DIR}/*.csproj" > /dev/null; then
              STACK_TYPE="dotnet"
            elif [[ -f "${CONTEXT_DIR}/mix.exs" ]]; then
              STACK_TYPE="elixir"
            elif [[ -f "${CONTEXT_DIR}/deno.json" || -f "${CONTEXT_DIR}/deno.jsonc" ]]; then
              STACK_TYPE="deno"
            else
              echo "Could not detect a known backend language. Using generic Nixpacks backend build."
              STACK_TYPE="generic"
            fi
          fi

          case "${STACK_TYPE}" in
            python|backend-python)
              echo "Using Python stack"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              elif [[ -f "${CONTEXT_DIR}/requirements.txt" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "pip install -r requirements.txt")
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              elif [[ -f "${CONTEXT_DIR}/app.py" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "python app.py")
              elif [[ -f "${CONTEXT_DIR}/main.py" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "python main.py")
              fi
              ;;

            go|backend-go)
              echo "Using Go stack"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--build-cmd "go mod download && go build -o app")
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              else
                NIXPACKS_CMD_ARGS+=(--start-cmd "./app")
              fi
              ;;

            java|backend-java)
              echo "Using Java stack"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              elif [[ -f "${CONTEXT_DIR}/pom.xml" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "mvn clean package -DskipTests")
              elif [[ -f "${CONTEXT_DIR}/build.gradle" || -f "${CONTEXT_DIR}/gradlew" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "./gradlew build -x test")
              else
                echo "ERROR: Java project detected, but no pom.xml, build.gradle or gradlew found."
                exit 1
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              elif [[ -f "${CONTEXT_DIR}/pom.xml" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "java -jar target/*.jar")
              else
                NIXPACKS_CMD_ARGS+=(--start-cmd "java -jar build/libs/*.jar")
              fi
              ;;

            node|backend-node|php|backend-php|ruby|backend-ruby|rust|backend-rust|dotnet|backend-dotnet|elixir|backend-elixir|deno|backend-deno|generic)
              echo "Using ${STACK_TYPE} backend stack with Nixpacks auto-detection"

              if [[ -n "${NIXPACKS_BUILD_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--build-cmd "${NIXPACKS_BUILD_CMD}")
              fi

              if [[ -n "${NIXPACKS_START_CMD}" ]]; then
                NIXPACKS_CMD_ARGS+=(--start-cmd "${NIXPACKS_START_CMD}")
              fi
              ;;

            *)
              echo "ERROR: Unsupported backend STACK_TYPE: ${STACK_TYPE}"
              echo "Allowed values: java, python, go, node, php, ruby, rust, dotnet, elixir, deno, back, backend, api"
              exit 1
              ;;
          esac

          timeout 20m nixpacks build "${CONTEXT_DIR}" \
            --env APP_ENV="${ENVIRONMENT}" \
            --env NIXPACKS_NODE_VERSION="${NODE_VERSION}" \
            "${NIXPACKS_CMD_ARGS[@]}" \
            --platform linux/amd64 \
            --tag "${AMD_TAG}"

          docker push "${AMD_TAG}"

          docker buildx imagetools create -t "${SHA_TAG}" "${AMD_TAG}"

          IFS=',' read -r -a BRANCHES <<< "${PUSH_LATEST_BRANCHES}"

          for BR in "${BRANCHES[@]}"; do
            BR_TRIMMED="$(echo "${BR}" | xargs)"

            if [[ "${GITHUB_REF_NAME}" == "${BR_TRIMMED}" ]]; then
              SHOULD_PUSH_LATEST="true"
              break
            fi
          done

          if [[ "${SHOULD_PUSH_LATEST}" == "true" ]]; then
            docker buildx imagetools create -t "${LATEST_TAG}" "${AMD_TAG}"
            echo "Published latest tag: ${LATEST_TAG}"
          else
            echo "Skipping latest tag for branch ${GITHUB_REF_NAME}"
          fi

          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"
